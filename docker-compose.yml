services:
  backend:
    image: python:3.11-slim
    working_dir: /app
    command: >-
      bash -lc "pip install uv &&
      uv pip install --system fastapi uvicorn httpx sse-starlette pydantic pydantic-settings sqlalchemy aiosqlite &&
      python main.py"
    environment:
      SIMULATION_MODE: "true"
      BOT_API_KEY: "dev-bot-key"
      CORS_ORIGINS_RAW: '["http://localhost:3000","http://127.0.0.1:3000"]'
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    healthcheck:
      test:
        ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 15s
      timeout: 5s
      retries: 10

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: >-
      sh -lc "npm install && npm run dev -- --hostname 0.0.0.0 --port 3000"
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:8000"
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./frontend:/app
    ports:
      - "3000:3000"
